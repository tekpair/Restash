<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Restash — Bulk Seller preview (active)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1b1d3a; --muted: #6a6d8c;
    --purple: #5b3fd6; --purple-deep: #46309f; --purple-tint: #ece8fb; --purple-tint-2: #f4f1fd;
    --navy-1: #2b2e66; --navy-2: #15173a;
    --gold-soft: #fbf4e3; --gold-soft-border: #efe0b8; --gold-label: #8a6a12;
    --amber-tint: #fbf1dd; --amber: #9a6a06;
    --red: #b3261e; --red-soft: #fbeae8;
    --blue: #1c5e8a; --blue-soft: #e6f0f6;
    --bg: #f4f4fb; --surface: #ffffff; --border: #e6e5f1;
    --display: "Bricolage Grotesque", "Plus Jakarta Sans", system-ui, sans-serif;
    --body: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; display: flex; justify-content: center; }
  .shell { width: 100%; max-width: 620px; min-height: 100vh; display: flex; flex-direction: column; padding: 0 24px; }
  svg { display: block; }
  a { color: var(--purple); }

  header { display: flex; align-items: center; justify-content: space-between; padding: 22px 0 0; }
  .brand { display: flex; align-items: center; gap: 9px; background: none; border: none; cursor: pointer; padding: 0; }
  .brand .mark { width: 30px; height: 30px; border-radius: 9px; background: var(--purple-tint); color: var(--purple); display: flex; align-items: center; justify-content: center; }
  .brand .mark svg { width: 18px; height: 18px; }
  .brand .word { font-family: var(--display); font-weight: 700; font-size: 19px; letter-spacing: -0.02em; color: var(--ink); }
  .acct { position: relative; width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1.5px solid var(--border); color: var(--ink); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color .15s ease, background .15s ease; }
  .acct svg { width: 19px; height: 19px; }
  .acct:hover, .acct.live { border-color: var(--purple); background: var(--purple-tint-2); color: var(--purple); }
  .acct:focus-visible, .brand:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(91,63,214,0.22); border-radius: 50%; }
  .cart-dot { position: absolute; top: -3px; right: -3px; min-width: 17px; height: 17px; padding: 0 4px; border-radius: 999px; background: var(--purple); color: #fff; font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center; border: 2px solid var(--bg); }
  .cart-dot.show { display: flex; }

  #progress { margin-top: 28px; min-height: 1px; }
  .progress-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
  .progress-step { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--muted); }
  .progress-pct { font-size: 11px; font-weight: 600; color: var(--purple); }
  .segs { display: flex; gap: 5px; }
  .seg { height: 4px; flex: 1; border-radius: 999px; background: #e2e1ee; }
  .seg.on { background: var(--purple); }

  main { flex: 1; }
  .screen { animation: fade .24s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .screen.center { text-align: center; padding-top: 12px; }

  .h1 { font-family: var(--display); font-weight: 700; font-size: 30px; letter-spacing: -0.025em; line-height: 1.1; color: var(--ink); margin-top: 32px; }
  .screen.center .h1 { margin-top: 20px; }
  .sub { margin-top: 11px; font-size: 15px; line-height: 1.5; color: var(--muted); max-width: 48ch; }
  .screen.center .sub { margin-left: auto; margin-right: auto; }
  .tagline { margin-top: 14px; font-family: var(--display); font-weight: 700; font-size: 14px; line-height: 1.35; letter-spacing: -0.02em; color: var(--purple); white-space: nowrap; }
  @media (max-width: 410px) { .tagline { white-space: normal; } }
  .land-meta { margin-top: 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; }
  .paynote { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; font-size: 12.5px; font-weight: 500; color: var(--gold-label); }
  .land-meta .paynote { margin-top: 0; }
  .why-foot { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 22px; font-size: 13.5px; font-weight: 600; color: var(--purple); }
  .why-foot svg { width: 15px; height: 15px; }
  .why-foot:hover { text-decoration: underline; }
  .paynote svg { width: 14px; height: 14px; }
  .reg-note { margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .reg-note svg { width: 13px; height: 13px; }
  .screen.center .reg-note { margin-left: auto; margin-right: auto; }

  .backbtn { display: inline-flex; align-items: center; gap: 4px; margin-top: 26px; font-family: var(--body); font-size: 13.5px; font-weight: 500; color: var(--muted); background: none; border: none; cursor: pointer; padding: 2px 0; }
  .backbtn svg { width: 16px; height: 16px; }
  .backbtn:hover { color: var(--purple); }

  .list { margin-top: 24px; display: flex; flex-direction: column; gap: 11px; }
  .card { display: flex; align-items: center; gap: 15px; width: 100%; text-align: left; background: var(--surface); border: 1.5px solid var(--border); border-radius: 15px; padding: 16px 17px; cursor: pointer; font-family: var(--body); color: var(--ink); transition: border-color .16s ease, background .16s ease, transform .16s ease; }
  .tile { flex: none; width: 44px; height: 44px; border-radius: 11px; background: var(--purple-tint); color: var(--purple); display: flex; align-items: center; justify-content: center; transition: background .16s ease, color .16s ease; }
  .tile svg { width: 23px; height: 23px; }
  .card-body { flex: 1; min-width: 0; }
  .card-name { display: block; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .card-desc { display: block; font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .chev { flex: none; color: #c2c0d6; display: flex; transition: transform .16s ease, color .16s ease; }
  .chev svg { width: 19px; height: 19px; }
  .card:hover { border-color: var(--purple); background: var(--purple-tint-2); transform: translateY(-1px); }
  .card:hover .tile { background: var(--purple); color: #fff; }
  .card:hover .chev { color: var(--purple); transform: translateX(3px); }
  .card:focus-visible { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(91,63,214,0.2); }
  .card-disabled { cursor: default; opacity: 0.6; }
  .card-disabled:hover { border-color: var(--border); background: var(--surface); transform: none; }
  .card-disabled:hover .tile { background: var(--purple-tint); color: var(--purple); }

  /* Gold payout card — bright metallic gold on textured deep navy */
  .gold-card { position: relative; overflow: hidden; margin-top: 24px; border-radius: 18px; padding: 26px 24px; text-align: center;
    background:
      radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1.6px) 0 0 / 16px 16px,
      radial-gradient(120% 85% at 50% 0%, rgba(255,224,128,0.13) 0%, rgba(255,224,128,0) 58%),
      linear-gradient(165deg, var(--navy-1) 0%, var(--navy-2) 100%);
    border: 1px solid #353873; }
  .gold-card .gl { font-size: 11.5px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: #aeb0db; position: relative; }
  .gold-num { display: block; position: relative; font-family: var(--display); font-weight: 700; font-size: 46px; line-height: 1; letter-spacing: -0.02em; margin-top: 9px;
    background: linear-gradient(96deg, #efc94a 0%, #ffe680 28%, #fff3b8 50%, #ffe680 72%, #efc94a 100%);
    background-size: 220% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 9px rgba(255,213,90,0.30)); animation: shimmer 3.2s linear infinite; }
  @keyframes shimmer { to { background-position: 220% center; } }
  .spark { position: absolute; color: #ffe89c; opacity: 0; animation: tw 2.6s ease-in-out infinite; pointer-events: none; }
  .spark svg { width: 11px; height: 11px; }
  .s1 { top: 16px; left: 20px; animation-delay: 0s; } .s2 { top: 22px; right: 26px; animation-delay: .9s; } .s3 { bottom: 18px; left: 44px; animation-delay: 1.5s; } .s4 { bottom: 22px; right: 40px; animation-delay: 2.1s; }
  @keyframes tw { 0%,100% { opacity: .12; transform: scale(.8); } 50% { opacity: .8; transform: scale(1.15); } }

  .continue-blocked { display: flex; align-items: center; gap: 10px; }
  .continue-blocked .btn { flex: 1; margin: 0; }
  .min-flag { position: relative; flex: none; display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--amber); color: #1c1300; font-family: var(--display); font-weight: 800; font-size: 15px; line-height: 1; cursor: help; outline: none; }
  .min-flag .min-tip { position: absolute; bottom: calc(100% + 10px); right: -2px; left: auto; width: 232px; background: #1a1a2e; color: #eef; font-size: 12.5px; font-weight: 400; line-height: 1.5; text-align: left; padding: 11px 13px; border-radius: 12px; box-shadow: 0 10px 30px rgba(20,18,40,.28); opacity: 0; visibility: hidden; transform: translateY(4px); transition: opacity .16s ease, transform .16s ease; pointer-events: none; z-index: 60; }
  .min-flag .min-tip::after { content: ''; position: absolute; top: 100%; right: 9px; border: 6px solid transparent; border-top-color: #1a1a2e; }
  .min-flag:hover .min-tip, .min-flag:focus-visible .min-tip, .min-flag:focus .min-tip { opacity: 1; visibility: visible; transform: translateY(0); }
  .offer-help { margin-top: 14px; font-size: 13.5px; line-height: 1.5; color: var(--muted); text-align: center; }

  .summary { margin-top: 22px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 6px 16px; }
  .summary-row { display: flex; justify-content: space-between; gap: 14px; padding: 11px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .lbl { color: var(--muted); flex: none; display: inline-flex; align-items: center; gap: 8px; }
  .summary-row .lbl svg { width: 15px; height: 15px; color: #9a9ab4; flex: none; }
  .summary-row .val { font-weight: 600; text-align: right; }

  /* Read-only item list (claim form + claim detail) */
  .items { margin-top: 22px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 4px 16px; }
  .item-row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .item-ic { flex: none; width: 36px; height: 36px; border-radius: 9px; background: var(--purple-tint); color: var(--purple); display: flex; align-items: center; justify-content: center; }
  .item-ic svg { width: 19px; height: 19px; }
  .item-b { flex: 1; min-width: 0; }
  .item-t { display: block; font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em; }
  .item-m { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .item-r { flex: none; font-size: 14px; font-weight: 700; white-space: nowrap; }
  .item-r .q { color: var(--muted); font-weight: 600; margin-right: 6px; }

  /* Editable cart lines */
  .cart-list { margin-top: 22px; display: flex; flex-direction: column; gap: 11px; }
  .cart-line { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 15px; }
  .cl-top { display: flex; align-items: flex-start; gap: 12px; }
  .cl-icon { flex: none; width: 40px; height: 40px; border-radius: 10px; background: var(--purple-tint); color: var(--purple); display: flex; align-items: center; justify-content: center; }
  .cl-icon svg { width: 21px; height: 21px; }
  .cl-body { flex: 1; min-width: 0; }
  .cl-title { display: block; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .cl-meta { display: block; font-size: 12.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .cl-remove { flex: none; background: none; border: none; color: #b9b8cc; cursor: pointer; padding: 2px; border-radius: 6px; }
  .cl-remove svg { width: 17px; height: 17px; }
  .cl-remove:hover { color: var(--red); }
  .cl-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 13px; }
  .qty { display: inline-flex; align-items: center; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .qbtn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: none; cursor: pointer; color: var(--ink); }
  .qbtn:hover { background: var(--purple-tint-2); color: var(--purple); }
  .qbtn svg { width: 15px; height: 15px; }
  .qn { min-width: 32px; text-align: center; font-weight: 600; font-size: 14px; }
  .cl-amt { font-family: var(--display); font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }

  .field { margin-top: 16px; }
  .field label, .flabel { display: block; font-size: 13.5px; font-weight: 600; margin-bottom: 6px; }
  .field .opt { font-weight: 400; color: var(--muted); }
  .field input, .field textarea { width: 100%; font-family: var(--body); font-size: 15px; color: var(--ink); background: var(--surface); border: 1.5px solid var(--border); border-radius: 11px; padding: 12px 13px; resize: vertical; }
  .field input::placeholder, .field textarea::placeholder { color: #a7a6c0; }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(91,63,214,0.16); }
  .form-error { margin-top: 12px; font-size: 13.5px; font-weight: 500; color: var(--red); }
  .inline-msg { font-size: 13.5px; font-weight: 500; padding: 10px 13px; border-radius: 11px; margin-top: 12px; line-height: 1.45; }
  .inline-msg.err { color: #b3261e; background: #fbeae8; border: 1px solid #f0c7c3; }
  .inline-msg.ok { color: #5b3fd6; background: #f4f1fd; border: 1px solid #ece8fb; }
  [hidden] { display: none !important; }
  .forgot { margin-top: 8px; text-align: right; }
  .forgot a { font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; }
  .forgot a:hover { text-decoration: underline; }

  .pay-grid { margin-top: 4px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pay-opt { display: flex; align-items: center; gap: 11px; text-align: left; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 14px; cursor: pointer; font-family: var(--body); color: var(--ink); transition: border-color .15s ease, background .15s ease; }
  .pay-opt .pico { flex: none; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .pay-opt .pico svg { width: 21px; height: 21px; }
  .pico.brandfull { background: #003087; }
  .pico.brandfull svg { width: 23px; height: 23px; }
  .pico.brandcheck { background: var(--purple); color: #fff; }
  .pay-opt.sel .pico.brandfull { background: #003087; }
  .pay-opt.sel .pico.brandcheck { background: var(--purple); }
  .pay-opt .pname { display: block; font-size: 14.5px; font-weight: 600; }
  .pay-opt .pdesc { display: block; font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .pay-opt:hover { border-color: var(--purple); }
  .pay-opt.sel { border-color: var(--purple); background: var(--purple-tint-2); }
  .pay-opt:focus-visible { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(91,63,214,0.16); }

  .notice { margin-top: 18px; display: flex; gap: 10px; background: #f5f3ec; border: 1px solid #e7e3d3; border-radius: 12px; padding: 13px 15px; }
  .notice .nico { flex: none; color: var(--amber); margin-top: 1px; }
  .notice .nico svg { width: 17px; height: 17px; }
  .notice p { font-size: 12.5px; line-height: 1.5; color: #6b6450; }

  .agree { margin-top: 18px; display: flex; align-items: flex-start; gap: 11px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 15px; }
  .agree input { width: 19px; height: 19px; margin-top: 1px; accent-color: var(--purple); flex: none; cursor: pointer; }
  .agree label { font-size: 13px; line-height: 1.5; color: var(--ink); }
  .agree a { font-weight: 600; text-decoration: none; cursor: pointer; }
  .agree a:hover { text-decoration: underline; }

  .btn { font-family: var(--body); font-size: 15px; font-weight: 600; padding: 13px 20px; border-radius: 12px; border: 1.5px solid transparent; cursor: pointer; transition: background .15s ease, border-color .15s ease; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .btn svg { width: 17px; height: 17px; }
  .btn-primary { background: var(--purple); color: #fff; }
  .btn-primary:hover { background: var(--purple-deep); }
  .btn-secondary { background: transparent; color: var(--purple); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--purple); background: var(--purple-tint-2); }
  .btn-danger { background: transparent; color: #b3261e; border-color: #f0c7c3; }
  .btn-danger:hover { background: #fbeae8; border-color: #b3261e; }
  .btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(91,63,214,0.28); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary:disabled:hover { background: var(--purple); }
  .btn.full { width: 100%; margin-top: 20px; }
  .screen.center .btn { margin-top: 14px; }
  .btn-stack { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .btn-row.two { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .status-icon { width: 56px; height: 56px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-top: 8px; }
  .status-icon svg { width: 30px; height: 30px; }
  .status-icon.brand { background: var(--purple-tint); color: var(--purple); }
  .status-icon.amber { background: var(--amber-tint); color: var(--amber); }
  /* dramatic, slow, staggered entrance for the Claim-submitted screen */
  .screen.success-screen { animation: none; }
  .success-screen > * { opacity: 0; animation: popUp .6s cubic-bezier(.18,.7,.25,1.06) forwards; }
  .success-screen > *:nth-child(1) { animation-delay: .05s; }
  .success-screen > *:nth-child(2) { animation-delay: .22s; }
  .success-screen > *:nth-child(3) { animation-delay: .38s; }
  .success-screen > *:nth-child(4) { animation-delay: .56s; }
  .success-screen > *:nth-child(5) { animation-delay: .74s; }
  .success-screen > *:nth-child(6) { animation-delay: .92s; }
  .success-screen > *:nth-child(7) { animation-delay: 1.08s; }
  .success-screen > .status-icon { animation: iconPop .7s cubic-bezier(.16,.7,.22,1.3) .05s both; }
  .success-check svg path { stroke-dasharray: 26; stroke-dashoffset: 26; animation: drawCheck .5s ease .5s forwards; }
  @keyframes popUp { 0% { opacity: 0; transform: translateY(18px) scale(.96); } 60% { opacity: 1; } 100% { opacity: 1; transform: none; } }
  @keyframes iconPop { 0% { opacity: 0; transform: scale(.25); } 60% { opacity: 1; transform: scale(1.16); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes drawCheck { to { stroke-dashoffset: 0; } }
  .testnote { margin-top: 20px; font-size: 12px; line-height: 1.5; color: #9a9ab4; max-width: 42ch; margin-left: auto; margin-right: auto; }

  .steps { margin: 24px auto 0; max-width: 420px; text-align: left; background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 18px 20px; }
  .steps-title { font-size: 12px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .step { display: flex; align-items: flex-start; gap: 12px; padding: 7px 0; }
  .step-mark { flex: none; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .step-mark.done { background: var(--purple); color: #fff; }
  .step-mark.todo { background: var(--purple-tint); color: var(--purple); }
  .step-mark svg { width: 14px; height: 14px; }
  .step-text { font-size: 14px; line-height: 1.4; padding-top: 2px; }
  .step.is-done .step-text { color: var(--muted); }

  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 999px; }
  .badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .s-grey { color: #6b6e8c; background: #ecebf4; }
  .s-amber { color: var(--amber); background: var(--amber-tint); }
  .s-blue { color: var(--blue); background: var(--blue-soft); }
  .s-gold { color: var(--gold-label); background: var(--gold-soft); }
  .s-purple { color: var(--purple); background: var(--purple-tint); }
  .s-red { color: var(--red); background: var(--red-soft); }

  .legal .updated { margin-top: 8px; font-size: 12.5px; color: var(--muted); }
  .legal .intro { margin-top: 14px; font-size: 14px; line-height: 1.6; color: #41435f; }

    x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></svg>',
    download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M5 19h14"/></svg>',
    clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></svg>',
    phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3h3l1.5 4-2 1.5a12 12 0 0 0 4.5 4.5l1.5-2 4 1.5v3a2 2 0 0 1-2.2 2A16 16 0 0 1 4.5 5.2 2 2 0 0 1 6.5 3Z"/></svg>',
    mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 6.5l8 6 8-6"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13M10 11v6M14 11v6"/></svg>',
    handheld: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7.5" y="4" width="9" height="16" rx="1.6"/><rect x="3.4" y="6.5" width="3.3" height="11" rx="1.4"/><rect x="17.3" y="6.5" width="3.3" height="11" rx="1.4"/></svg>',
    gamepad: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 8h7a5 5 0 0 1 5 5v.2a3.1 3.1 0 0 1-5.6 1.9L14 14h-4l-.9 1.1A3.1 3.1 0 0 1 3.5 13.4V13a5 5 0 0 1 5-5Z"/><line x1="6.8" y1="11.3" x2="9.2" y2="11.3"/><line x1="8" y1="10.1" x2="8" y2="12.5"/><circle cx="15.4" cy="10.8" r="0.5" fill="currentColor" stroke="none"/><circle cx="17" cy="12.3" r="0.5" fill="currentColor" stroke="none"/></svg>',
    monitor: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
    tag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v5.2a2 2 0 0 0 .6 1.4l7.8 7.8a2 2 0 0 0 2.8 0l5.2-5.2a2 2 0 0 0 0-2.8L11.6 5.6A2 2 0 0 0 10.2 5H5a2 2 0 0 0-2 2Z"/><circle cx="7.6" cy="9.6" r="1.2"/></svg>',
    shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6Z"/><path d="M9 12l2 2 4-4"/></svg>',
    card: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 9.5h18M7 14.5h4"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9.5h16M8 3v4M16 3v4"/></svg>',
    hash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 7.5 20M16.5 4 15 20M5 9h15M4 15h15"/></svg>',
    box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8 12 3.5 21 8v8l-9 4.5L3 16Z"/><path d="M3 8l9 4.5 9-4.5M12 12.5V21"/></svg>',
    gamecase: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8.5 3v18"/></svg>',
    disc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="2.4"/></svg>',
    xcircle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5l-5 5M9.5 9.5l5 5"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.5l2.5 5.3 5.8.7-4.3 4 1.1 5.7L12 16.6 6.9 19.2l1.1-5.7-4.3-4 5.8-.7Z"/></svg>',
    refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.6-5.7L20 8.5M20 4v4.5h-4.5"/><path d="M20 12a8 8 0 0 1-13.6 5.7L4 15.5M4 20v-4.5h4.5"/></svg>',
    paypal: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%"><path fill="#ffffff" d="M15.607 4.653H8.941L6.645 19.251H1.82L4.862 0h7.995c3.754 0 6.375 2.294 6.473 5.513-.648-.478-2.105-.86-3.722-.86m6.57 5.546c0 3.41-3.01 6.853-6.958 6.853h-2.493L11.595 24H6.74l1.845-11.538h3.592c4.208 0 7.346-3.634 7.153-6.949a5.24 5.24 0 0 1 2.848 4.686M9.653 5.546h6.408c.907 0 1.942.222 2.363.541-.195 2.741-2.655 5.483-6.441 5.483H8.714Z"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s6.5-5.3 6.5-10a6.5 6.5 0 0 0-13 0c0 4.7 6.5 10 6.5 10Z"/><circle cx="12" cy="11" r="2.3"/></svg>'
  };
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  function flashMsg(slot) { return (state.flash && state.flash.slot === slot) ? '<div class="inline-msg ' + state.flash.kind + '">' + esc(state.flash.text) + '</div>' : ''; }

  var RestashAPI = {
    BULK: { min_paid: 25, min_age_days: 30, min_per_shipment: 10, min_per_month: 25, reapply_months: 3 },
    BULK_LINE: { phone: '(518) 555-0100', email: 'bulk@getrestash.gg' },
    fmtDate: function (iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); },
    daysSince: function (iso) { if (!iso) return 0; return Math.floor((Date.now() - Date.parse(iso)) / 86400000); },
    bulkEligibility: function (paid, age) { var p = paid >= 25, a = age >= 30; return { paidClaims: paid, ageDays: age, paidOk: p, ageOk: a, eligible: p && a }; }
  };
  var daysAgo = function (n) { return new Date(Date.now() - n * 864e5).toISOString(); };

const ACCT_TABS = [['profile', 'Profile'], ['claims', 'Claims'], ['bulk', 'Bulk Seller'], ['controls', 'Controls']];
  function acctNav() {
    return ACCT_TABS.map(t => {
      const dot = (t[0] === 'bulk' && state.bulk && ['pending', 'approved', 'suspended'].indexOf(state.bulk.status) !== -1) ? '<span class="acct-dot"></span>' : '';
      return '<button class="acct-tab' + (state.acctTab === t[0] ? ' on' : '') + '" data-action="acct-tab" data-value="' + t[0] + '">' + t[1] + dot + '</button>';
    }).join('');
  }
  function acctPanelHTML() {
    if (state.acctTab === 'claims') return acctClaims();
    if (state.acctTab === 'bulk') return acctBulk();
    if (state.acctTab === 'controls') return acctControls();
    return acctProfile();
  }
  function acctProfile() {
    const u = state.user;
    return '<div class="panel-head"><h2 class="panel-title">Profile</h2><p class="panel-sub">Payouts only go to a PayPal or check matching this name.</p></div>'
      + '<div class="panel">'
      + '<div class="field"><label for="ac-name">Full name</label><input id="ac-name" type="text" value="' + esc(u.name) + '"></div>'
      + '<div class="field"><label for="ac-email">Email</label><input id="ac-email" type="email" value="' + esc(u.email) + '" readonly></div>'
      + '<div class="field"><label for="ac-phone">Phone</label><input id="ac-phone" type="tel" value="' + esc(u.phone) + '"></div>'
      + '<div class="field"><label for="ac-addr">Mailing address <span class="opt">(for checks)</span></label><input id="ac-addr" type="text" placeholder="Street, City, State ZIP" value="' + esc(u.address || '') + '"></div>'
      + '<div class="field"><label for="ac-pass">New password</label><input id="ac-pass" type="password" placeholder="Leave blank to keep current"></div>'
      + flashMsg('profile')
      + '<button class="btn btn-primary full" data-action="save-profile">Save changes</button></div>';
  }
  function acctClaims() {
    const mine = state.claims.slice();
    const claimsHtml = mine.length ? mine.map(c =>
      '<button class="claim-row" data-action="goto" data-value="claimDetail" data-ref="' + c.ref + '"><span class="claim-main"><span class="claim-item">' + esc(c.itemName) + '</span><span class="claim-ref">' + esc(c.platform) + ' · ' + c.ref + ' · ' + c.createdAt + '</span></span>' + badge(c.status) + '<span class="chev">' + I.chevron + '</span></button>'
    ).join('') : '<div class="empty">No claims yet. <a data-action="home">Sell a game</a>.</div>';
    return '<div class="panel-head"><h2 class="panel-title">Claims</h2><p class="panel-sub">Track status, review offers, and see history for each claim.</p></div>'
      + '<div class="acct-claims">' + claimsHtml + '</div>';
  }
  function acctControls() {
    return '<div class="panel-head"><h2 class="panel-title">Controls</h2><p class="panel-sub">Request a copy of your information, or permanently close your account.</p></div>'
      + flashMsg('data')
      + '<div class="data-actions"><button class="btn btn-secondary full" data-action="request-data">' + I.download + 'Request a copy of my information</button>'
      + (state.confirmDelete
          ? '<div class="danger-confirm"><p><span class="dc-ic">' + I.alert + '</span>This permanently deletes your account and all your claims. This can’t be undone.</p><div class="btn-row two"><button class="btn btn-danger" data-action="confirm-delete">Yes, delete my account</button><button class="btn btn-secondary" data-action="cancel-delete">Cancel</button></div></div>'
          : '<button class="btn btn-danger full" data-action="delete-account">' + I.trash + 'Delete account</button>')
      + '</div>'
      + '<div class="btn-stack"><button class="btn btn-secondary" data-action="logout">' + I.logout + 'Log out</button></div>';
  }

  // ---- Bulk Seller program (beta) ----
  function paidClaimsCount() { return state.claims.filter(c => c.status === 'paid').length + (state.user.lifetimePaid || 0); }
  function acctAgeDays() { return RestashAPI.daysSince(state.user.createdAt); }
  function paidThisMonth() {
    const now = new Date();
    return state.claims.filter(c => {
      if (c.status !== 'paid') return false;
      const t = Date.parse(c.createdAt); if (isNaN(t)) return false;
      const d = new Date(t); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;
  }
  const BULK_BADGE = { pending: ['Under review', 'b-amber'], approved: ['Active', 'b-green'], suspended: ['Suspended', 'b-amber'], declined: ['Not approved', 'b-grey'], closed: ['Closed', 'b-red'] };
  function bulkBadge(st) { const b = BULK_BADGE[st]; return b ? ' <span class="bulk-badge ' + b[1] + '">' + b[0] + '</span>' : ''; }
  function reqRow(ok, label, detail) {
    return '<li class="req' + (ok ? ' met' : '') + '"><span class="req-ic">' + (ok ? I.check : I.lock) + '</span><span class="req-body"><span class="req-label">' + label + '</span>' + (detail ? '<span class="req-detail">' + detail + '</span>' : '') + '</span></li>';
  }
  function bulkAgreementCard(B) {
    return '<div class="bulk-card"><div class="bulk-card-h">' + I.shield + 'The Bulk Seller agreement</div><ul class="bulk-rules">'
      + '<li>Sell at least <strong>' + B.min_per_month + ' games a month</strong> — fall short and your status is suspended.</li>'
      + '<li>Ship a minimum of <strong>' + B.min_per_shipment + ' games per shipment</strong>.</li>'
      + '<li>No counterfeits, ownership issues, or repeated condition mismatches — these <strong>close your Bulk Seller account immediately</strong>.</li>'
      + '<li>While active, you sell <strong>only</strong> through the Bulk Seller lane — the standard one-by-one flow is turned off for your account.</li>'
      + '</ul></div>';
  }
  function bulkApplyForm(elig, paid, age, B) {
    return '<div class="bulk-card"><div class="bulk-card-h">' + I.check + 'Requirements to apply</div><ul class="req-list">'
      + reqRow(elig.paidOk, B.min_paid + '+ paid claims in good standing', 'You have ' + paid)
      + reqRow(elig.ageOk, B.min_age_days + '+ days on Restash', age + ' day' + (age === 1 ? '' : 's') + ' so far')
      + reqRow(false, 'A valid government ID for verification', 'Confirm below')
      + '</ul></div>'
      + '<div class="bulk-apply">'
      + flashMsg('bulk')
      + '<label class="bulk-check"><input type="checkbox" id="bulk-id"> I can provide a valid government ID when the Restash team asks.</label>'
      + '<label class="bulk-check"><input type="checkbox" id="bulk-agree"> I have read and accept the <a href="terms.html" target="_blank" rel="noopener">Bulk Seller Agreement</a> and the commitments above.</label>'
      + (elig.eligible
          ? '<button class="btn btn-primary full" data-action="bulk-apply">' + I.star + 'Apply to the Bulk Seller program</button>'
          : '<button class="btn btn-primary full" disabled>Apply to the Bulk Seller program</button><p class="bulk-gate">' + I.lock + 'You can apply once you meet the ' + B.min_paid + '-paid-claim and ' + B.min_age_days + '-day requirements above.</p>')
      + '</div>';
  }
  function bulkStatusCard(kind, icon, title, sub) {
    return '<div class="bulk-status ' + kind + '"><span class="bs-ic">' + icon + '</span><div><div class="bs-title">' + title + '</div><div class="bs-sub">' + sub + '</div></div></div>';
  }
  function acctBulk() {
    const B = RestashAPI.BULK;
    const st = state.bulk ? state.bulk.status : null;
    const reason = (state.bulk && state.bulk.reason) ? esc(state.bulk.reason) + ' ' : '';
    const paid = paidClaimsCount(), age = acctAgeDays();
    const elig = RestashAPI.bulkEligibility(paid, age);
    const head = '<div class="panel-head"><span class="bulk-kicker">' + I.star + 'Beta program</span>'
      + '<h2 class="panel-title">Bulk Seller' + bulkBadge(st) + '</h2>'
      + '<p class="panel-sub">Approved sellers skip the one-by-one flow and ship lots straight to Restash — reviewed and paid in bulk. Entry is by application, approved by the Restash team.</p></div>';
    if (st === 'pending') {
      return head + bulkStatusCard('amber', I.clock, 'Application under review',
        'The Restash team is reviewing your application' + (state.bulk.appliedAt ? ' (submitted ' + esc(RestashAPI.fmtDate(state.bulk.appliedAt)) + ')' : '') + '. We’ll email you with a decision. You can keep selling normally in the meantime.')
        + bulkAgreementCard(B);
    }
    if (st === 'approved') {
      const month = paidThisMonth(), monthOk = month >= B.min_per_month;
      const pct = Math.min(100, Math.round(month / B.min_per_month * 100));
      return head + bulkStatusCard('green', I.check, 'You’re an active Bulk Seller',
        'Submit one manifest per lot — we email a prepaid label, inspect on arrival (priority), and send a single bulk offer. The standard one-by-one flow is turned off for your account.')
        + '<button class="btn btn-primary full" data-action="goto-bulk-submit">' + I.plus + 'Submit a bulk manifest</button>'
        + '<div class="bulk-meter"><div class="bm-top"><span>This month’s paid claims</span><span class="bm-val' + (monthOk ? ' ok' : '') + '">' + month + ' / ' + B.min_per_month + '</span></div><div class="bm-track"><span class="bm-fill' + (monthOk ? ' ok' : '') + '" style="width:' + pct + '%"></span></div><div class="bm-note">' + (monthOk ? 'You’ve met this month’s minimum.' : 'Reach ' + B.min_per_month + ' paid claims this month to stay active.') + '</div></div>'
        + bulkLineCard(RestashAPI.BULK_LINE)
        + bulkAgreementCard(B);
    }
    if (st === 'suspended') {
      return head + bulkStatusCard('amber', I.alert, 'Your Bulk Seller status is suspended',
        reason + 'Complete ' + B.min_per_month + ' paid claims this month to be reinstated. If you don’t, your Bulk Seller account is closed and you may reapply after ' + B.reapply_months + ' months. You can still sell normally.')
        + bulkAgreementCard(B);
    }
    if (st === 'declined' || st === 'closed') {
      return head + bulkStatusCard('grey', I.info, st === 'closed' ? 'Your Bulk Seller account is closed' : 'Application not approved',
        reason + (st === 'closed' ? 'You may reapply after ' + B.reapply_months + ' months. ' : '') + 'You can keep using Restash normally.')
        + bulkAgreementCard(B)
        + (st === 'declined' ? bulkApplyForm(elig, paid, age, B) : '');
    }
    return head + bulkAgreementCard(B) + bulkApplyForm(elig, paid, age, B);
  }
  function bulkLineCard(L) {
    return '<div class="bulk-line"><div class="bl-h">' + I.clock + '24/7 direct line</div>'
      + '<p class="bl-sub">Active Bulk Sellers get a direct line to our team, any time.</p>'
      + '<a class="bl-row" href="tel:' + L.phone.replace(/[^0-9+]/g, '') + '">' + I.phone + esc(L.phone) + '</a>'
      + '<a class="bl-row" href="mailto:' + esc(L.email) + '">' + I.mail + esc(L.email) + '</a></div>';
  }
  var thisMonthPaid = []; for (var i = 0; i < 18; i++) thisMonthPaid.push({ status: 'paid', createdAt: RestashAPI.fmtDate(new Date()) });
    var state = {
      acctTab: 'bulk', flash: null, confirmDelete: false,
      user: { name: 'Riley Park', email: 'riley.park@email.com', phone: '(518) 555-0163', address: '5 Ontario St, Cohoes, NY 12047', createdAt: daysAgo(96), lifetimePaid: 41 },
      bulk: { status: 'approved', appliedAt: daysAgo(20), decidedAt: daysAgo(18) },
      claims: thisMonthPaid
    };
  document.getElementById('acct-nav').innerHTML = acctNav();
  document.getElementById('acct-panel').innerHTML = acctBulk();
  // Keep the preview inert: swallow clicks on the mocked controls.
  document.body.addEventListener('click', function (e) { var t = e.target.closest('[data-action]'); if (t) e.preventDefault(); });
})();
</script>
</body>
</html>
