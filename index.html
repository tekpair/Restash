<style>
  :root {
    --ink: #1b1d3a; --muted: #6a6d8c;
    --purple: #5b3fd6; --purple-deep: #46309f; --purple-tint: #ece8fb; --purple-tint-2: #f4f1fd;
    --navy-1: #2b2e66; --navy-2: #15173a;
    --gold-soft: #fbf4e3; --gold-soft-border: #efe0b8; --gold-label: #8a6a12;
    --amber-tint: #fbf1dd; --amber: #9a6a06;
    --red: #b3261e; --red-soft: #fbeae8;
    --blue: #1c5e8a; --blue-soft: #e6f0f6;
    --bg: #f4f4fb; --surface: #ffffff; --border: #dcd6ee;
    --display: "Bricolage Grotesque", "Plus Jakarta Sans", system-ui, sans-serif;
    --body: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: linear-gradient(165deg, #e7e2f7 0%, #d8d0ef 58%, #ded7f3 100%); background-color: #dad2f0; color: var(--ink); -webkit-font-smoothing: antialiased; display: flex; justify-content: center; }
  /* Textured, gently drifting light-purple backdrop (sits behind everything). */
  body::before { content: ""; position: fixed; inset: -28px; z-index: -1; pointer-events: none;
    background-image:
      radial-gradient(42% 34% at 14% 8%, rgba(123,97,231,0.22), transparent 70%),
      radial-gradient(40% 32% at 88% 12%, rgba(160,130,255,0.17), transparent 70%),
      radial-gradient(48% 40% at 80% 94%, rgba(123,97,231,0.18), transparent 72%),
      radial-gradient(rgba(91,63,214,0.07) 1px, transparent 1.7px);
    background-size: auto, auto, auto, 22px 22px;
    background-repeat: no-repeat, no-repeat, no-repeat, repeat;
    animation: bgDrift 28s ease-in-out infinite alternate; }
  @keyframes bgDrift { from { transform: translate3d(-12px, -6px, 0); } to { transform: translate3d(12px, 10px, 0); } }
  @media (prefers-reduced-motion: reduce) { body::before { animation: none; transform: none; } }
  .shell { width: 100%; max-width: 620px; min-height: 100vh; display: flex; flex-direction: column; padding: 0 24px; }
  svg { display: block; }
  a { color: var(--purple); }

  header { display: flex; align-items: center; justify-content: space-between; padding: 22px 0 0; }

  .acct:focus-visible, .brand:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(91,63,214,0.22); border-radius: 50%; }
  .cart-dot { position: absolute; top: -3px; right: -3px; min-width: 17px; height: 17px; padding: 0 4px; border-radius: 999px; background: var(--purple); color: #fff; font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center; border: 2px solid var(--bg); }

  #progress { margin-top: 28px; min-height: 1px; }

  .tile { flex: none; width: 44px; height: 44px; border-radius: 11px; background: var(--purple-tint); color: var(--purple); display: flex; align-items: center; justify-content: center; transition: background .16s ease, color .16s ease; }
  .tile svg { width: 23px; height: 23px; }
  .card-body { flex: 1; min-width: 0; }
  .card-name { display: block; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .card-desc { display: block; font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .chev { flex: none; color: #c2c0d6; display: flex; transition: transform .16s ease, color .16s ease; }
  .chev svg { width: 19px; height: 19px; }
  .card:hover { border-color: var(--purple); background: var(--purple-tint-2); transform: translateY(-1px); }
  .card:hover .tile { background: var(--purple); color: #fff; }
  .card:hover .chev { color: var(--purple); transform: translateX(3px); }
  .card:focus-visible { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(91,63,214,0.2); }
  .card-disabled { cursor: default; opacity: 0.6; }
  .card-disabled:hover { border-color: var(--border); background: var(--surface); transform: none; }
  .card-disabled:hover .tile { background: var(--purple-tint); color: var(--purple); }

  /* Gold payout card — bright metallic gold on textured deep navy */
  .gold-card { position: relative; overflow: hidden; margin-top: 24px; border-radius: 18px; padding: 26px 24px; text-align: center;
    background:
      radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1.6px) 0 0 / 16px 16px,
      radial-gradient(120% 85% at 50% 0%, rgba(255,224,128,0.13) 0%, rgba(255,224,128,0) 58%),
      linear-gradient(165deg, var(--navy-1) 0%, var(--navy-2) 100%);
    border: 1px solid #353873; }
  .gold-card .gl { font-size: 11.5px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: #aeb0db; position: relative; }
  .gold-num { display: block; position: relative; font-family: var(--display); font-weight: 700; font-size: 46px; line-height: 1; letter-spacing: -0.02em; margin-top: 9px;
    background: linear-gradient(96deg, #efc94a 0%, #ffe680 28%, #fff3b8 50%, #ffe680 72%, #efc94a 100%);
    background-size: 220% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 9px rgba(255,213,90,0.30)); animation: shimmer 3.2s linear infinite; }
  @keyframes shimmer { to { background-position: 220% center; } }

  .spark svg { width: 11px; height: 11px; }
  .s1 { top: 16px; left: 20px; animation-delay: 0s; } .s2 { top: 22px; right: 26px; animation-delay: .9s; } .s3 { bottom: 18px; left: 44px; animation-delay: 1.5s; } .s4 { bottom: 22px; right: 40px; animation-delay: 2.1s; }
  @keyframes tw { 0%,100% { opacity: .12; transform: scale(.8); } 50% { opacity: .8; transform: scale(1.15); } }

  .min-flag .min-tip { position: absolute; bottom: calc(100% + 10px); right: -2px; left: auto; width: 232px; background: #1a1a2e; color: #eef; font-size: 12.5px; font-weight: 400; line-height: 1.5; text-align: left; padding: 11px 13px; border-radius: 12px; box-shadow: 0 10px 30px rgba(20,18,40,.28); opacity: 0; visibility: hidden; transform: translateY(4px); transition: opacity .16s ease, transform .16s ease; pointer-events: none; z-index: 60; }
  .min-flag .min-tip::after { content: ''; position: absolute; top: 100%; right: 9px; border: 6px solid transparent; border-top-color: #1a1a2e; }

  /* Editable cart lines */
  .cart-list { margin-top: 22px; display: flex; flex-direction: column; gap: 11px; }
  .cart-line { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 15px; }
  .cl-top { display: flex; align-items: flex-start; gap: 12px; }

  .qty { display: inline-flex; align-items: center; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .qbtn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: none; cursor: pointer; color: var(--ink); }
  .qbtn:hover { background: var(--purple-tint-2); color: var(--purple); }
  .qbtn svg { width: 15px; height: 15px; }

  .cl-amt { font-family: var(--display); font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }

  .field { margin-top: 16px; }

  /* dramatic, slow, staggered entrance for the Claim-submitted screen */
  .screen.success-screen { animation: none; }
  .success-screen > * { opacity: 0; animation: popUp .6s cubic-bezier(.18,.7,.25,1.06) forwards; }
  .success-screen > *:nth-child(1) { animation-delay: .05s; }
  .success-screen > *:nth-child(2) { animation-delay: .22s; }
  .success-screen > *:nth-child(3) { animation-delay: .38s; }
  .success-screen > *:nth-child(4) { animation-delay: .56s; }

  .success-screen > *:nth-child(6) { animation-delay: .92s; }
  .success-screen > *:nth-child(7) { animation-delay: 1.08s; }

  .success-check svg path { stroke-dasharray: 26; stroke-dashoffset: 26; animation: drawCheck .5s ease .5s forwards; }
  @keyframes popUp { 0% { opacity: 0; transform: translateY(18px) scale(.96); } 60% { opacity: 1; } 100% { opacity: 1; transform: none; } }
  @keyframes iconPop { 0% { opacity: 0; transform: scale(.25); } 60% { opacity: 1; transform: scale(1.16); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes drawCheck { to { stroke-dashoffset: 0; } }

  /* Welcome splash (shown to logged-out visitors on load) */
  body.welcome-mode header, body.welcome-mode footer, body.welcome-mode #progress { display: none; }

  .wc-inner { position: relative; display: flex; flex-direction: column; align-items: center; }
  .wc-glow { position: absolute; top: -34px; left: 50%; width: 240px; height: 240px; transform: translateX(-50%); border-radius: 50%; background: radial-gradient(circle, rgba(91,63,214,0.20) 0%, rgba(91,63,214,0) 70%); filter: blur(6px); pointer-events: none; z-index: 0; animation: wcGlow .9s ease both; }
  .wc-mark { position: relative; z-index: 1; width: 78px; height: 78px; border-radius: 22px; background: linear-gradient(160deg, #ece8fb 0%, #f4f1fd 100%); color: var(--purple); display: flex; align-items: center; justify-content: center; animation: wcMark .7s cubic-bezier(.2,.85,.25,1) both; }
  .wc-mark svg { width: 44px; height: 44px; transform-origin: center; animation: wcSpin 1.1s cubic-bezier(.2,.8,.2,1) .15s both; }
  .wc-title { position: relative; z-index: 1; margin-top: 24px; font-family: var(--display); font-weight: 700; font-size: 33px; letter-spacing: -0.025em; color: var(--ink); animation: wcRise .6s ease .4s both; }
  .wc-sub { position: relative; z-index: 1; margin-top: 10px; font-size: 15.5px; color: var(--muted); animation: wcRise .6s ease .58s both; }
  .wc-prog { position: relative; z-index: 1; margin-top: 34px; width: 132px; height: 4px; border-radius: 999px; background: #e2e1ee; overflow: hidden; }
  .wc-bar { display: block; height: 100%; width: 0; border-radius: 999px; background: var(--purple); animation: wcFill 2.6s linear .4s both; }
  @keyframes wcMark { 0% { opacity: 0; transform: scale(.55) translateY(10px); } 65% { opacity: 1; transform: scale(1.06) translateY(0); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes wcSpin { from { transform: rotate(-170deg); } to { transform: rotate(0); } }
  @keyframes wcGlow { from { opacity: 0; transform: translateX(-50%) scale(.7); } to { opacity: .9; transform: translateX(-50%) scale(1); } }
  @keyframes wcRise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes wcFill { from { width: 0; } to { width: 100%; } }

  ];
  let COND_ICON = { sealed: 'box', complete: 'gamecase', loose: 'disc', broken: 'xcircle' };
  let PRICING = RestashAPI.DEFAULT_PRICING;
  function editionIconName(name) { if (/game of the year/i.test(name)) return 'star'; if (/hits|reprint/i.test(name)) return 'refresh'; return 'tag'; }

  const STEP_OF = { platform: 1, title: 2, edition: 3, condition: 4 };
  const PAGES = ['terms', 'privacy', 'login', 'register', 'forgot', 'authRequired', 'account', 'claimDetail'];

    submitted: ['Submitted', 's-grey'], reviewing: ['Under review', 's-amber'],
    accepted: ['Accepted', 's-blue'], received: ['Received', 's-blue'],
    offer: ['Offer made', 's-gold'], paid: ['Paid', 's-purple'],
    declined: ['Not accepted', 's-red'], returned: ['Returned', 's-grey']
  };
  const badge = (st) => { const b = BADGES[st] || BADGES.submitted; return '<span class="badge ' + b[1] + '">' + b[0] + '</span>'; };

    view: 'platform', returnTo: 'platform', pendingClaim: false,
    platformId: null, titleId: null, editionId: null, condId: null,
    cart: [], payout: null, draft: {}, regDraft: {}, flash: null,
    loggedIn: false, user: { name: '', email: '', phone: '' },

  function cartTotals() {
    const items = state.cart.map(it => ({ unit_market: it.unitMarket, qty: it.qty }));
    const offer = RestashAPI.computeOffer(items, PRICING);
    const market = state.cart.reduce((s, it) => s + lineMidOf(it), 0);
    const games = state.cart.reduce((s, it) => s + it.qty, 0);
    const meetsMin = offer >= PRICING.min_quote || games >= PRICING.min_games;
    return { offer, market, games, meetsMin, low: Math.round(offer * 0.85), high: offer };
  }
  const cartQty = () => state.cart.reduce((s, it) => s + it.qty, 0);
  const MAX_CLAIM_GAMES = 10;
  const bulkActive = () => !!(state.bulk && state.bulk.status === 'approved');

    return '<div class="gold-card"><span class="spark s1">' + I.spark + '</span><span class="spark s2">' + I.spark + '</span><span class="spark s3">' + I.spark + '</span><span class="spark s4">' + I.spark + '</span><span class="gl">' + label + '</span><span class="gold-num">' + amount + '</span></div>';
  }

  function itemsPanel(items) {
    return '<div class="items">' + items.map(d =>
      '<div class="item-row"><span class="item-ic">' + I.gamepad + '</span><span class="item-b"><span class="item-t">' + esc(d.title) + '</span><span class="item-m">' + esc(d.meta) + '</span></span><span class="item-r">' + (d.qty > 1 ? '<span class="q">×' + d.qty + '</span>' : '') + '$' + d.amount + '</span></div>'
    ).join('') + '</div>';
  }
  const cartDisplay = () => state.cart.map(it => ({ title: it.titleName, meta: it.platformName + ' · ' + it.editionName + ' · ' + it.condName, qty: it.qty, amount: lineMidOf(it) }));
  const claimDisplay = (items) => items.map(it => ({ title: it.titleName, meta: it.platformName + ' · ' + it.editionName + ' · ' + it.condName, qty: it.qty, amount: it.lineMid }));

  function progressHTML() {
    if (state.view === 'ineligible') return '<div class="progress-head"><span class="progress-step">Not eligible</span></div><div class="segs">' + '<span class="seg"></span>'.repeat(4) + '</div>';
    const step = STEP_OF[state.view];
    if (!step) return '';
    const pct = Math.round((step / 4) * 100) + '%';
    let segs = '';
    for (let i = 0; i < 4; i++) segs += '<span class="seg' + (i < step ? ' on' : '') + '"></span>';
    return '<div class="progress-head"><span class="progress-step">Step ' + step + ' of 4</span><span class="progress-pct">' + pct + '</span></div><div class="segs">' + segs + '</div>';
  }

  const TERMS_INTRO = 'These Terms of Service ("Terms") govern your use of Restash, a service that buys physical video games for cash, operated by Restash ("Restash," "we," "us"). By creating an account or submitting a claim, you agree to these Terms.';
  const TERMS = [
    { h: '1. Acceptance of these Terms', body: '<p>By accessing Restash, creating an account, or submitting a claim, you agree to be bound by these Terms and our <a data-action="goto" data-value="privacy">Privacy Policy</a>. If you do not agree, do not use the service.</p>' },
    { h: '2. Definitions', body: '<ul><li><strong>Game</strong> — a physical video game (disc or cartridge) you submit to sell.</li><li><strong>Estimate</strong> — a preliminary, non-binding price range shown before inspection.</li><li><strong>Offer</strong> — a price we make after inspecting your games.</li></ul>' },
    { h: '3. Account &amp; eligibility', body: '<p><strong>A free Restash account is required to submit a claim and to be paid.</strong> You must be at least 18 years old, provide accurate information, and keep your account secure. One account per person. The legal name on your account must match the name on your PayPal account or check; we use it to verify and issue payment.</p>' },
    { h: '4. How selling works', body: '<ol><li>You build a claim from your account — add one or more games, set the quantity of each, choose edition and condition, and pick a payout method.</li><li>We review your claim, typically within <strong>2–3 business days</strong>.</li><li>We choose whether to accept the games for inspection and send a prepaid shipping label. <strong>Acceptance is limited and at our sole discretion.</strong> Either way, we email you our decision and update your claim in <strong>My Claims</strong>.</li><li>If accepted, you ship the games using our label. We email you when they arrive; an outcome follows in <strong>2–3 business days</strong>.</li><li>We make an offer or decline. Offers appear in <strong>My Claims</strong> and by email.</li><li>You accept or decline the offer in <strong>My Claims</strong>. If you accept, we authorize payment. If you decline or do not respond within the stated window, we return the games.</li></ol>' },
    { h: '5. Estimates are not offers', body: '<p>An estimate is preliminary and non-binding. It does not guarantee acceptance or purchase, and your final offer may differ once we confirm each game\u2019s edition and condition on inspection. If a game\u2019s condition differs from the grade you selected, we re-grade it on inspection — this changes its value and your offer, and the change and the reason are shown on your claim. You review the final offer before any payment.</p>' },
    { h: '6. Selective acceptance', body: '<p>We personally select which games to inspect and may decline any claim, or any individual game within it, for any lawful reason, including limited capacity. If we decline based on your claim, we will notify you by email and in My Claims.</p>' },
    { h: '7. Authenticity &amp; condition', body: '<p>We buy authentic, working games only. <strong>We may reject and refuse payment for counterfeit, reproduction, pirated, or non-working copies</strong>, and for games whose condition or edition differs materially from your claim. Rejected games are returned to you, except where the law requires otherwise. Condition and authenticity are confirmed on inspection.</p>' },
    { h: '8. Shipping &amp; risk of loss', body: '<p>You are responsible for the games while they are in transit to us. <strong>We are not responsible for, and will not reimburse, packages lost or damaged in transit to us for review.</strong> If a package is lost, we will make reasonable efforts to work with you and the carrier, but cannot guarantee recovery or payment.</p>' },
    { h: '9. Offers, acceptance &amp; returns', body: '<p>We confirm condition and edition on inspection, which may change the offer. You review and accept or decline each offer in My Claims. If you decline an offer, or we decline the games, we return them to you and email tracking.</p>' },
    { h: '10. Payments', body: '<p>If you accept an offer, we authorize payment by your chosen method:</p><ul><li><strong>PayPal</strong> — standard transfer, typically received within <strong>1–3 business days</strong>.</li><li><strong>Check</strong> — typically received within <strong>3–5 business days</strong>, with emailed tracking. If a check is lost in transit, we issue a stop-payment order and reissue, which may take an additional <strong>3–5 business days</strong>.</li></ul><p><strong>We pay out only when the name on the PayPal account or check matches the name on your Restash account. We will not pay out otherwise.</strong></p>' },
    { h: '11. Ownership &amp; prohibited conduct', body: '<p>By submitting a claim you certify, <strong>under penalty of perjury</strong>, that you are the lawful owner of the games, that they are authentic, and that you have the right to sell them. You may not submit stolen, counterfeit, or misrepresented games, or use the service unlawfully.</p>' },
    { h: '12. Suspected stolen property', body: '<p>If we reasonably suspect a game was stolen, we may hold the item and withhold payment. <strong>Law enforcement will be notified, your account will be immediately and permanently closed, and you may face legal action from us.</strong></p>' },
    { h: '13. Suspension &amp; termination', body: '<p>We may suspend or close accounts that violate these Terms, including for fraud or abuse. You may close your account by contacting us.</p>' },
    { h: '14. Third-party services &amp; trademarks', body: '<p>Payments and delivery rely on third parties, including PayPal and mail carriers. PayPal and the PayPal logo are trademarks of PayPal, Inc. Nintendo, Sony, Microsoft, their consoles, and all game titles are trademarks of their respective owners, used here only to identify the games we buy. Restash is independent and is not affiliated with, sponsored by, or endorsed by any of them.</p>' },
    { h: '15. Disclaimers &amp; limitation of liability', body: '<p>The service is provided "as is." To the maximum extent permitted by law, Restash is not liable for indirect or consequential damages. Some states do not allow the exclusion of certain warranties or the limitation of incidental or consequential damages, so some of the above may not apply to you.</p>' },
    { h: '16. Company &amp; governing law', body: '<p>Restash is located in Cohoes, Albany County, New York. These Terms are governed by the laws of the State of New York, without regard to its conflict-of-laws rules. You agree that any dispute arising out of these Terms or your use of Restash will be brought exclusively in the state or federal courts located in Albany County, New York, and you consent to the personal jurisdiction of those courts.</p>' },
    { h: '17. Changes to these Terms', body: '<p>We may update these Terms and will post the updated version with a new effective date. Continued use after changes means you accept them.</p>' },
    { h: '18. Contact', body: '<p>Questions about these Terms? Email <a href="mailto:hello@getrestash.gg">hello@getrestash.gg</a>.<br>Restash · Cohoes, New York</p>' }
  ];
  const PRIVACY_INTRO = 'This Privacy Policy explains what information Restash collects, how we use it, and your choices. By using Restash you agree to this policy.';
  const PRIVACY = [
    { h: '1. Information we collect', body: '<ul><li><strong>Account information</strong> — name, email, phone number, and password.</li><li><strong>Claim &amp; game details</strong> — the games you submit, their edition, condition, and quantity, notes, and our inspection results (the confirmed condition grade).</li><li><strong>Payout information</strong> — your PayPal email or mailing address.</li><li><strong>Technical information</strong> — including <strong>IP addresses</strong>, device and usage data.</li><li><strong>Communications</strong> — emails and messages between you and Restash.</li></ul>' },
    { h: '2. How we use your information', body: '<p>To create and secure your account; review and process claims; communicate decisions, offers, and tracking; verify your identity; issue payment; and detect and prevent fraud, counterfeits, or abuse of the platform.</p>' },
    { h: '3. Accounts are required', body: '<p>A Restash account is required to participate. Your claims, offers, and payout history are tied to your account and visible to you in My Claims.</p>' },
    { h: '4. Identity &amp; payout matching', body: '<p>To reduce fraud, we pay out only when the name on your PayPal account or check matches the name on your Restash account. Verifying this may involve reviewing the information you provide.</p>' },
    { h: '5. Communications', body: '<p>We email you about your account and claims — confirmations, review decisions, shipping labels, arrival notices, offers, payment authorizations, and tracking. These are service communications related to your transactions.</p>' },
    { h: '6. Fraud prevention &amp; law enforcement', body: '<p>If we suspect unlawful activity, such as the sale of stolen or counterfeit games, we may retain relevant information and share it with law enforcement, and take action on your account as described in our <a data-action="goto" data-value="terms">Terms of Service</a>.</p>' },
    { h: '7. Sharing with service providers', body: '<p>We share limited information with providers that help us operate, such as payment and shipping partners. These include PayPal (payments), the U.S. Postal Service and other shipping carriers, Resend (transactional email), Supabase (secure database and authentication hosting), and Google Maps (address autocomplete). Each receives only the information needed to do its job.</p>' },
    { h: '8. Retention &amp; your choices', body: '<p>We retain information as needed to provide the service, comply with law, and prevent fraud. You can request a copy of your information, or ask us to correct or delete it, by emailing hello@getrestash.gg. We honor these requests except where we must keep records to meet tax, accounting, or other legal obligations or to prevent fraud.</p>' },
    { h: '9. Contact', body: '<p>Questions about privacy? Email <a href="mailto:hello@getrestash.gg">hello@getrestash.gg</a>.<br>Restash · Cohoes, New York</p>' }
  ];
  function legalPage(title, intro, sections) {
    return '<div class="screen legal"><button class="backbtn" data-action="back-page">' + I.back + 'Back</button>'
      + '<h1 class="h1">' + title + '</h1><p class="updated">Effective June 16, 2026 · Restash</p>'
      + '<p class="intro">' + intro + '</p>'
      + ''
      + sections.map(s => '<h3 class="lh">' + s.h + '</h3>' + s.body).join('') + '</div>';
  }

  const views = {
    welcome() {
      return '<div class="screen welcome" data-action="enter-app"><div class="wc-inner"><span class="wc-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 13.5a6.5 6.5 0 0 1 10.4-5.2"/><path d="M16 5.7v3.2h-3.2"/><path d="M18.5 10.5a6.5 6.5 0 0 1-10.4 5.2"/><path d="M8 18.3v-3.2h3.2"/></svg></span><h1 class="wc-title">Welcome to Restash</h1><p class="wc-sub">Instant cash. Zero hassle. Skip the marketplace.</p><span class="wc-prog"><span class="wc-bar"></span></span></div></div>';
    },
    platform() {
      // Active Bulk Sellers can't use the standard one-by-one flow.
      if (state.loggedIn && state.bulk && state.bulk.status === 'approved') return bulkLaneGate();
      const cards = PLATFORMS.map(p =>
        '<button class="card" data-action="pick-platform" data-value="' + p.id + '" aria-label="Sell ' + esc(p.name) + ' games"><span class="tile">' + I[p.icon] + '</span><span class="card-body"><span class="card-name">' + esc(p.name) + '</span></span><span class="chev">' + I.chevron + '</span></button>'
      ).join('');
      const cartLine = state.cart.length ? '<span class="reg-note">' + I.check + cartQty() + ' game' + (cartQty() > 1 ? 's' : '') + ' in your claim — <a data-action="goto-cart" style="font-weight:600;cursor:pointer;">review</a></span>' : '';
      return '<div class="screen"><h1 class="h1">Sell your games</h1>'
        + '<p class="tagline">Instant cash. Zero hassle. Skip the marketplace.</p>'
        + '<p class="sub">Pick a platform for an instant, no-obligation offer.</p>'
        + '<div class="land-meta"><span class="paynote">' + I.dollar + 'Free shipping label · paid in 1–5 business days</span></div>'
        + cartLine
        + '<div class="list">' + cards + '</div>'
        + '<a href="why-restash.html" class="why-foot">Why sell with Restash? ' + I.chevron + '</a>'
        + '</div>';
    },
    title() {
      const p = plat();
      const cards = p.titles.map(t =>
        '<button class="card" data-action="pick-title" data-value="' + t.id + '"><span class="tile">' + I.gamepad + '</span><span class="card-body"><span class="card-name">' + esc(t.name) + '</span></span><span class="chev">' + I.chevron + '</span></button>'
      ).join('');
      return '<div class="screen">' + backBtn('platform') + '<h1 class="h1">Which game?</h1><p class="sub">Select your ' + esc(p.name) + ' title.</p><div class="list">' + cards + '<div class="card card-disabled" aria-disabled="true"><span class="tile">' + I.gamepad + '</span><span class="card-body"><span class="card-name" style="color:#9a9ab4;font-weight:500;">More titles coming soon</span></span></div></div></div>';
    },
    edition() {
      const t = title();
      const cards = t.editions.map(e =>
        '<button class="card" data-action="pick-edition" data-value="' + e.id + '"><span class="tile">' + I[editionIconName(e.name)] + '</span><span class="card-body"><span class="card-name">' + esc(e.name) + '</span>' + (e.desc ? '<span class="card-desc">' + esc(e.desc) + '</span>' : '') + '</span><span class="chev">' + I.chevron + '</span></button>'

    },
    condition() {
      const rows = CONDITIONS.map(cd =>
        '<button class="card" data-action="pick-condition" data-value="' + cd.id + '"><span class="tile">' + I[COND_ICON[cd.id]] + '</span><span class="card-body"><span class="card-name">' + cd.name + '</span><span class="card-desc">' + cd.desc + '</span></span><span class="chev">' + I.chevron + '</span></button>'

      return '<div class="screen">' + backBtn('edition') + '<h1 class="h1">What condition is it in?</h1><p class="sub">Be honest — your estimate depends on it. We confirm each game’s condition on inspection and re-grade it if it differs, so your offer matches what you actually sent. <a href="grading.html">See our grading guide</a>.</p><div class="list">' + rows + '</div></div>';
    },
    ineligible() {
      return '<div class="screen center"><span class="status-icon amber">' + I.alert + '</span><h1 class="h1">We can\u2019t accept this</h1><p class="sub">Restash buys authentic, working games. Non-working, cracked, or reproduction copies aren\u2019t eligible. If it still plays, head back and pick a different condition.</p><div class="btn-stack" style="max-width:300px;margin-left:auto;margin-right:auto;"><button class="btn btn-secondary" data-action="back" data-value="condition">Choose a different condition</button>' + (state.cart.length ? '<button class="btn btn-primary" data-action="goto-cart">Back to your claim (' + cartQty() + ')</button>' : '') + '</div></div>';
    },
    cart() {
      if (!state.cart.length) { state.view = 'platform'; return views.platform(); }
      const t = cartTotals();
      const atCap = claimCapReached();
      const incAttr = atCap ? ' disabled style="opacity:.4;cursor:not-allowed;"' : '';
      const lines = state.cart.map((it, i) =>
        '<div class="cart-line"><div class="cl-top"><span class="cl-icon">' + I.gamepad + '</span><span class="cl-body"><span class="cl-title">' + esc(it.titleName) + '</span><span class="cl-meta">' + esc(it.platformName + ' · ' + it.editionName + ' · ' + it.condName) + '</span></span><button class="cl-remove" data-action="cart-remove" data-idx="' + i + '" aria-label="Remove ' + esc(it.titleName) + '">' + I.trash + '</button></div><div class="cl-bottom"><div class="qty"><button class="qbtn" data-action="qty-dec" data-idx="' + i + '" aria-label="Decrease quantity">' + I.minus + '</button><span class="qn">' + it.qty + '</span><button class="qbtn" data-action="qty-inc" data-idx="' + i + '" aria-label="Increase quantity"' + incAttr + '>' + I.plus + '</button></div><span class="cl-amt">$' + lineMidOf(it) + '</span></div></div>'
      ).join('');
      const minTip = 'We take claims with an estimated offer of at least $' + PRICING.min_quote + ', or ' + PRICING.min_games + '+ games — shipping makes a single low-value game a wash. Add another to continue.';
      const minFlag = t.meetsMin ? '' : '<span class="min-flag" tabindex="0" role="img" aria-label="' + minTip + '">!<span class="min-tip">' + minTip + '</span></span>';

      return '<div class="screen"><h1 class="h1">Your games</h1><p class="sub">Adjust quantities, add more games, or continue to your claim.</p>'
        + goldCard('Estimated cash offer', '$' + t.low + ' – $' + t.high)
        + '<div class="cart-list">' + lines + '</div>'
        + (atCap ? '<div class="cap-note">' + I.info + '<span>That’s the max <strong>' + MAX_CLAIM_GAMES + ' games</strong> for one claim. Submit this claim, then start another.</span></div>' : '')

        + (state.loggedIn ? '' : '<br><span class="reg-note" style="display:flex;justify-content:center;">' + I.lock + 'You\u2019ll need a free account to submit.</span>')
        + '</div>';
    },
    authRequired() {
      return '<div class="screen center"><span class="status-icon brand">' + I.lock + '</span><h1 class="h1">Create an account to continue</h1><p class="sub">Restash requires a free account to submit a claim and get paid.</p><div class="btn-stack" style="max-width:300px;margin:18px auto 0;"><button class="btn btn-primary" data-action="goto" data-value="register">Create account</button><button class="btn btn-secondary" data-action="goto" data-value="login">I already have an account</button></div></div>';
    },
    claim() {
      const t = cartTotals(), u = state.user, d = state.draft || {};
      const val = (k) => esc(d[k] != null ? d[k] : (u[k] || ''));
      const sel = m => state.payout === m ? ' sel' : '';
      return '<div class="screen">' + backBtn('cart') + '<h1 class="h1">Submit your claim</h1>'
        + itemsPanel(cartDisplay())
        + '<div class="summary">' + sumRow(I.dollar, 'Estimated cash offer', '$' + t.low + ' – $' + t.high) + '</div>'

        + '<div class="field"><span class="flabel">How would you like to be paid?</span><div class="pay-grid"><button type="button" class="pay-opt' + sel('PayPal') + '" data-action="pick-payout" data-value="PayPal"><span class="pico brandfull">' + I.paypal + '</span><span><span class="pname">PayPal</span><span class="pdesc">To your PayPal email</span></span></button><button type="button" class="pay-opt' + sel('Check') + '" data-action="pick-payout" data-value="Check"><span class="pico brandcheck">' + I.receipt + '</span><span><span class="pname">Check</span><span class="pdesc">Mailed to your address</span></span></button></div></div>'

        + '<div class="field"><label for="cf-notes">Notes <span class="opt">(optional)</span></label><textarea id="cf-notes" rows="3" placeholder="Anything we should know about your games?">' + esc(d.notes || '') + '</textarea></div>'
        + '<div class="notice"><span class="nico">' + I.info + '</span><p>An estimate and a submitted claim don\u2019t guarantee a sale. We accept a limited number of games right now and personally choose which to inspect — you\u2019ll get the decision in <strong>My Claims</strong> and by email. If a game\u2019s condition differs from what you selected, we re-grade it on inspection and adjust the offer, with the reason shown on your claim — and you still review before any payment. Payouts are sent only to a PayPal account or check in the <strong>same name as your Restash account</strong>.</p></div>'
        + '<div class="agree"><input type="checkbox" id="cf-terms"' + (d.terms ? ' checked' : '') + '><label for="cf-terms">I certify under penalty of perjury that I am the legal owner of these games and that they are authentic, and I agree to the <a data-action="goto" data-value="terms">Terms of Service</a> and <a data-action="goto" data-value="privacy">Privacy Policy</a>.</label></div>'

    },
    success() {

      const steps = [
        { t: 'Submit your claim', done: true },
        { t: 'We review your claim within 2–3 business days', done: false },
        { t: 'If accepted, we email a free shipping label', done: false },
        { t: 'Ship your games — outcome in 2–3 days', done: false },
        { t: 'We send an offer to My Claims — accept or decline', done: false },
        { t: 'Accept and get paid by PayPal or Check', done: false }
      ];
      const list = steps.map((s, i) => '<div class="step' + (s.done ? ' is-done' : '') + '"><span class="step-mark ' + (s.done ? 'done' : 'todo') + '">' + (s.done ? I.check : (i + 1)) + '</span><span class="step-text">' + s.t + '</span></div>').join('');
      return '<div class="screen center success-screen"><span class="status-icon brand success-check">' + I.check + '</span><h1 class="h1">Claim submitted</h1>'
        + '<p class="sub">Thanks' + (first ? ', ' + esc(first) : '') + '. Your reference is <strong style="color:var(--ink)">' + cl.ref + '</strong>.</p>'

    },

        : '<div class="summary">' + sumRow(I.dollar, 'Estimate', '$' + c.estLow + ' – $' + c.estHigh) + sumRow(I.card, 'Payout method', c.payout) + (c.payout === 'Check' && c.address ? sumRow(I.pin, 'Mailing address', c.address) : '') + sumRow(I.hash, 'Reference', c.ref) + sumRow(I.calendar, 'Submitted', c.createdAt) + '</div>';

  // ---- Bulk Seller program (beta) ----
  function paidClaimsCount() { return state.claims.filter(c => c.status === 'paid').length + (state.user.lifetimePaid || 0); }
  function acctAgeDays() { return RestashAPI.daysSince(state.user.createdAt); }
  function gamesThisMonth() {
    const now = new Date();
    return state.claims.reduce((sum, c) => {
      if (c.status !== 'paid') return sum;
      const t = Date.parse(c.createdAt); if (isNaN(t)) return sum;
      const d = new Date(t); if (d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear()) return sum;
      const g = c.bulk ? (c.estCount || 0) : (c.items || []).reduce((s, it) => s + (it.qty || 1), 0);
      return sum + g;
    }, 0);
  }
  const BULK_BADGE = { pending: ['Under review', 'b-amber'], approved: ['Active', 'b-green'], suspended: ['Suspended', 'b-amber'], declined: ['Not approved', 'b-grey'], closed: ['Closed', 'b-red'] };
  function bulkBadge(st) { const b = BULK_BADGE[st]; return b ? ' <span class="bulk-badge ' + b[1] + '">' + b[0] + '</span>' : ''; }
  function reqRow(ok, label, detail) {
    return '<li class="req' + (ok ? ' met' : '') + '"><span class="req-ic">' + (ok ? I.check : I.lock) + '</span><span class="req-label">' + label + '</span>' + (detail ? '<span class="req-val">' + detail + '</span>' : '') + '</li>';

  function bulkStatusCard(kind, icon, title, sub) {

  function acctBulk() {
    const B = RestashAPI.BULK;
    const st = state.bulk ? state.bulk.status : null;
    const reason = (state.bulk && state.bulk.reason) ? esc(state.bulk.reason) + ' ' : '';
    const paid = paidClaimsCount(), age = acctAgeDays();
    const elig = RestashAPI.bulkEligibility(paid, age, !state.user.flagged);
    const head = '<div class="panel-head"><span class="bulk-kicker">' + I.star + 'Beta program</span>'

        + bulkAgreementCard(B);

    if (st === 'approved') {
      const month = gamesThisMonth(), monthOk = month >= B.min_games_per_month;

  function loadPlaces() {
    const key = (window.RESTASH_CONFIG || {}).GOOGLE_MAPS_API_KEY;
    if (!key || /YOUR-|REPLACE/i.test(key)) return;
    window.__restashPlacesReady = function () { placesReady = true; attachAddressAutocomplete(); };
    const s = document.createElement('script');
    s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key) + '&libraries=places&loading=async&callback=__restashPlacesReady';
    s.async = true; s.defer = true; document.head.appendChild(s);
  }
  function attachAddressAutocomplete() {
    if (!placesReady || !(window.google && google.maps && google.maps.places)) return;
    ['cf-addr', 'ac-addr'].forEach(function (id) {
      const el = document.getElementById(id);
      if (!el || el.dataset.acAttached) return;
      el.dataset.acAttached = '1';
      try {
        const ac = new google.maps.places.Autocomplete(el, { types: ['address'], componentRestrictions: { country: ['us'] }, fields: ['formatted_address'] });
        ac.addListener('place_changed', function () { const p = ac.getPlace(); if (p && p.formatted_address) { el.value = p.formatted_address; el.dispatchEvent(new Event('input', { bubbles: true })); } });
      } catch (e) { /* Places unavailable — leave as a plain input */ }
    });
  }
  function go(view) { if (state.view === 'claim') captureDraft(); if (state.view === 'register') captureReg(); state.view = view; state.flash = null; state.confirmDelete = false; state.confirmBulkClose = false; render(); }
  function goto(view, ref) { if (!PAGES.includes(state.view)) state.returnTo = state.view; if (ref) state.activeClaimRef = ref; go(view); }
  function afterAuth() { if (state.pendingClaim) { state.pendingClaim = false; go('claim'); } else { state.acctTab = 'profile'; go('account'); } }
  function resetItem() { state.platformId = state.titleId = state.editionId = state.condId = null; }

  function showErr(id, msg) { const e = document.getElementById(id); if (e) { e.textContent = msg; e.hidden = false; } }
  function flashMsg(slot) { return (state.flash && state.flash.slot === slot) ? '<div class="inline-msg ' + state.flash.kind + '">' + esc(state.flash.text) + '</div>' : ''; }
  const emailOk = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const phoneOk = v => v.replace(/\D/g, '').length >= 10;

  function addCurrentItemToCart() {
    const p = plat(), t = title(), e = edition(), cd = cond();
    if (!p || !t || !e || !cd) return false;
    if (claimCapReached()) return false;
    const existing = state.cart.find(it => it.editionId === e.id && it.conditionId === cd.id);
    if (existing) { existing.qty += 1; }
    else { state.cart.push({ platformName: p.name, titleName: t.name, editionName: e.name, editionId: e.id, editionBase: e.base, condName: cd.name, conditionId: cd.id, condMult: cd.mult, unitMarket: RestashAPI.marketValue(e, cd), qty: 1 }); }
    return true;
  }

  document.body.addEventListener('click', async (e) => {
    const el = e.target.closest('[data-action]'); if (!el) return;
    const a = el.dataset.action, v = el.dataset.value, ref = el.dataset.ref, idx = el.dataset.idx != null ? parseInt(el.dataset.idx, 10) : null;
    if (el.tagName === 'A' && !el.getAttribute('href')) e.preventDefault();

    if (a === 'home') { resetItem(); go('platform'); }
    else if (a === 'enter-app') { enterApp(); }
    else if (a === 'pick-platform') { state.platformId = v; state.titleId = state.editionId = null; go('title'); }
    else if (a === 'pick-title') { state.titleId = v; state.editionId = null; go('edition'); }
    else if (a === 'pick-edition') { state.editionId = v; go('condition'); }
    else if (a === 'pick-condition') { const c = CONDITIONS.find(x => x.id === v); state.condId = v; if (c && c.ineligible) { go('ineligible'); } else { addCurrentItemToCart(); resetItem(); go('cart'); } }
    else if (a === 'add-another') { resetItem(); go('platform'); }
    else if (a === 'goto-cart') { if (state.cart.length) go('cart'); else go('platform'); }
    else if (a === 'qty-inc') { if (idx != null && state.cart[idx]) { if (claimCapReached()) return; state.cart[idx].qty += 1; render(); } }
    else if (a === 'qty-dec') { if (idx != null && state.cart[idx]) { if (state.cart[idx].qty <= 1) { state.cart.splice(idx, 1); if (!state.cart.length) { resetItem(); go('platform'); } else { render(); } } else { state.cart[idx].qty -= 1; render(); } } }
    else if (a === 'cart-remove') { if (idx != null && state.cart[idx]) { state.cart.splice(idx, 1); if (!state.cart.length) { resetItem(); go('platform'); } else { render(); } } }
    else if (a === 'to-claim') { if (!state.cart.length) return go('platform'); if (!cartTotals().meetsMin) return; if (state.loggedIn) { go('claim'); } else { state.pendingClaim = true; goto('authRequired'); } }
    else if (a === 'pick-payout') { state.payout = v; document.querySelectorAll('.pay-opt').forEach(o => o.classList.toggle('sel', o.dataset.value === v)); const af = document.getElementById('cf-addr-field'); if (af) af.hidden = (v !== 'Check'); const er = document.getElementById('cf-error'); if (er) er.hidden = true; }
    else if (a === 'submit-claim') {
      if (!state.loggedIn) { state.pendingClaim = true; return goto('authRequired'); }
      if (!state.cart.length) return go('platform');
      const name = document.getElementById('cf-name').value.trim();
      const email = document.getElementById('cf-email').value.trim();
      const phone = document.getElementById('cf-phone').value.trim();
      const terms = document.getElementById('cf-terms').checked;
      if (!name) return showErr('cf-error', 'Please enter your name.');
      if (!emailOk(email)) return showErr('cf-error', 'Please enter a valid email address.');
      if (!phoneOk(phone)) return showErr('cf-error', 'Please enter a valid phone number.');
      if (!state.payout) return showErr('cf-error', 'Please choose how you\u2019d like to be paid.');
      const address = state.payout === 'Check' ? document.getElementById('cf-addr').value.trim() : '';
      if (state.payout === 'Check' && !address) return showErr('cf-error', 'Please enter the mailing address for your check.');
      if (!terms) return showErr('cf-error', 'Please certify ownership and agree to the Terms to continue.');
      const notesEl = document.getElementById('cf-notes');
      const notes = notesEl ? notesEl.value.trim() : '';
      el.disabled = true;
      try {
        const items = state.cart.map(it => ({ edition_id: it.editionId, condition_id: it.conditionId, qty: it.qty }));
        const r = await RestashAPI.submitClaim({ items, payout: state.payout, phone, address, notes });
        await loadClaims();
        // Clear the in-progress claim and skip go()'s captureDraft (the form is
        // still mounted), so the next claim starts blank — no carried-over
        // notes, payout, or checked Terms box.
        state.activeClaimRef = r; state.cart = []; state.draft = {}; state.payout = null; resetItem();
        state.flash = null; state.view = 'success'; render();
      } catch (err) { el.disabled = false; showErr('cf-error', err.message || 'Could not submit your claim.'); }
    }
    else if (a === 'goto') { goto(v, ref); }
    else if (a === 'account-icon') { if (state.loggedIn) { state.acctTab = 'profile'; goto('account'); } else { goto('login'); } }
    else if (a === 'back-page') { go(state.returnTo || 'platform'); }
    else if (a === 'back') { go(v); }
    else if (a === 'do-login') {
      const email = document.getElementById('lg-email').value.trim();
      const pass = document.getElementById('lg-pass').value;
      if (!emailOk(email)) return showErr('auth-error', 'Please enter a valid email.');
      if (!pass) return showErr('auth-error', 'Please enter your password.');
      el.disabled = true;
      try { await RestashAPI.signIn({ email, password: pass }); await loadSession(); await loadClaims(); afterAuth(); }
      catch (err) { el.disabled = false; showErr('auth-error', err.message || 'Could not sign in. Check your email and password.'); }
    }
    else if (a === 'do-register') {
      const name = document.getElementById('rg-name').value.trim();
      const email = document.getElementById('rg-email').value.trim();
      const phone = document.getElementById('rg-phone').value.trim();
      const pass = document.getElementById('rg-pass').value;
      const terms = document.getElementById('rg-terms').checked;
      if (!name) return showErr('auth-error', 'Please enter your name.');
      if (!emailOk(email)) return showErr('auth-error', 'Please enter a valid email.');
      if (!phoneOk(phone)) return showErr('auth-error', 'Please enter a valid phone number.');
      if (pass.length < 8) return showErr('auth-error', 'Password must be at least 8 characters.');
      if (!terms) return showErr('auth-error', 'Please agree to the Terms and Privacy Policy to continue.');
      el.disabled = true;
      try {
        await RestashAPI.signUp({ name, email, phone, password: pass });
        state.regDraft = {};
        const u = await RestashAPI.currentUser();
        if (u) { await loadSession(); await loadClaims(); afterAuth(); }
        else { state.flash = { slot: 'login', kind: 'ok', text: 'Account created. Check your email to confirm, then log in.' }; go('login'); }
      } catch (err) { el.disabled = false; showErr('auth-error', err.message || 'Could not create your account.'); }
    }
    else if (a === 'do-forgot') {
      const email = document.getElementById('fg-email').value.trim();
      if (!emailOk(email)) return showErr('auth-error', 'Please enter a valid email.');
      try { await RestashAPI.resetPassword(email); } catch (err) { /* don't reveal which emails exist */ }
      state.flash = { slot: 'forgot', kind: 'ok', text: 'If that email has an account, a reset link is on its way.' };
      render();
    }
    else if (a === 'do-set-password') {
      const pw = document.getElementById('rp-pass').value;
      const pw2 = document.getElementById('rp-pass2').value;
      if (pw.length < 8) return showErr('auth-error', 'Password must be at least 8 characters.');
      if (pw !== pw2) return showErr('auth-error', 'Those passwords don’t match.');
      el.disabled = true;
      try {
        await RestashAPI.updatePassword(pw);
        state.recovery = false;
        if (window.history && window.history.replaceState) window.history.replaceState(null, '', window.location.pathname + window.location.search);
        await loadSession(); await loadClaims();
        state.flash = { slot: 'profile', kind: 'ok', text: 'Password updated — you’re signed in.' };
        go(state.loggedIn ? 'account' : 'login');
      } catch (err) { el.disabled = false; showErr('auth-error', err.message || 'Could not update your password. The reset link may have expired — request a new one.'); }
    }
    else if (a === 'save-profile') {
      el.disabled = true;
      try {
        const p = await RestashAPI.updateProfile({ full_name: document.getElementById('ac-name').value.trim(), phone: document.getElementById('ac-phone').value.trim(), address: document.getElementById('ac-addr').value.trim() });
        const pw = document.getElementById('ac-pass'); if (pw && pw.value) { await RestashAPI.updatePassword(pw.value); pw.value = ''; }
        state.user = Object.assign({}, state.user, { name: p.full_name, email: p.email, phone: p.phone, address: p.address });
        state.flash = { slot: 'profile', kind: 'ok', text: 'Profile saved.' };
      } catch (err) { state.flash = { slot: 'profile', kind: 'err', text: err.message || 'Could not save your profile.' }; }
      el.disabled = false; renderAcctPanel();
    }
    else if (a === 'acct-tab') { state.acctTab = v; state.flash = null; state.confirmDelete = false; state.confirmBulkClose = false; renderAcctPanel(); }
    else if (a === 'goto-bulk') { state.acctTab = 'bulk'; state.flash = null; goto('account'); }
    else if (a === 'goto-bulk-submit') { go('bulkSubmit'); }
    else if (a === 'back-to-claims') { state.acctTab = 'claims'; state.flash = null; goto('account'); }
    else if (a === 'submit-bulk') {
      const manifest = document.getElementById('bulk-manifest').value.trim();
      const countRaw = document.getElementById('bulk-count').value.trim();
      const payout = 'PayPal';
      const B = RestashAPI.BULK;
      if (manifest.length < 10) return showErr('bulk-error', 'Add a short manifest describing the lot.');
      const count = parseInt(countRaw, 10);
      if (isNaN(count) || count < B.min_per_shipment) return showErr('bulk-error', 'Enter an estimate of at least ' + B.min_per_shipment + ' games per shipment.');
      el.disabled = true;
      try {
        const ref = await RestashAPI.submitBulkClaim({ manifest, estCount: count, payout, address: '' });
        await loadClaims();
        state.acctTab = 'claims'; goto('claimDetail', ref);
      } catch (err) { el.disabled = false; showErr('bulk-error', err.message || 'Could not submit your manifest.'); }
    }
    else if (a === 'bulk-apply') {
      const id = document.getElementById('bulk-id'), agree = document.getElementById('bulk-agree');
      if (!id || !id.checked || !agree || !agree.checked) return showErr('bulk-apply-error', 'Please confirm the government ID and accept the agreement to apply.');
      el.disabled = true;
      try {
        await RestashAPI.bulkApply({ agreement: true, idProvided: true });
        await loadSession();
        renderAcctPanel();
      } catch (err) { el.disabled = false; showErr('bulk-apply-error', err.message || 'Could not submit your application.'); }
    }
    else if (a === 'bulk-close-start') { state.confirmBulkClose = true; renderAcctPanel(); }
    else if (a === 'bulk-close-cancel') { state.confirmBulkClose = false; renderAcctPanel(); }
    else if (a === 'bulk-close-confirm') {
      el.disabled = true;
      try {
        await RestashAPI.closeBulkMembership();
        await loadSession();
        state.confirmBulkClose = false;
        renderAcctPanel();
      } catch (err) { el.disabled = false; showErr('bulk-close-error', err.message || 'Could not submit your closure.'); }
    }
    else if (a === 'offer-accept' || a === 'offer-decline') {
      const resp = a === 'offer-accept' ? 'accepted' : 'declined';
      el.disabled = true;
      try { await RestashAPI.respondToOffer(ref, resp); await loadClaims(); }
      catch (err) { alert(err.message || 'Could not submit your response.'); }
      render();
    }
    else if (a === 'logout') { try { await RestashAPI.signOut(); } catch (e) {} state.loggedIn = false; state.user = { name: '', email: '', phone: '' }; state.bulk = { status: null }; state.claims = []; go('platform'); }
    else if (a === 'delete-account') { state.confirmDelete = true; renderAcctPanel(); }
    else if (a === 'cancel-delete') { state.confirmDelete = false; renderAcctPanel(); }
    else if (a === 'confirm-delete') {
      try {
        await RestashAPI.deleteAccount();
        state.loggedIn = false; state.user = { name: '', email: '', phone: '' }; state.claims = []; state.confirmDelete = false;
        state.view = 'login'; state.returnTo = 'platform';
        state.flash = { slot: 'login', kind: 'ok', text: 'Your account has been deleted.' };
        render();
      } catch (err) { state.flash = { slot: 'data', kind: 'err', text: err.message || 'Could not delete your account.' }; render(); }
    }
    else if (a === 'restart') { resetItem(); state.activeClaimRef = null; go('platform'); }
  });

  // ---- data loading -------------------------------------------------
  async function loadSession() {
    const u = await RestashAPI.currentUser();
    state.loggedIn = !!u;
    if (u) {
      const p = await RestashAPI.getProfile();
      state.user = p ? { name: p.full_name, email: p.email, phone: p.phone, address: p.address, createdAt: p.created_at, lifetimePaid: p.lifetime_paid || 0, flagged: !!p.flagged }
                     : { name: '', email: u.email || '', phone: '' };
      state.bulk = p ? { status: p.bulk_status || null, reason: p.bulk_reason || '', appliedAt: p.bulk_applied_at || null, decidedAt: p.bulk_decided_at || null } : { status: null };
    } else {
      state.user = { name: '', email: '', phone: '' };
      state.bulk = { status: null };
    }
  }
  async function loadClaims() {
    state.claims = state.loggedIn ? await RestashAPI.myClaims() : [];
  }
  function configBanner() {
    document.getElementById('progress').innerHTML = '';
    document.getElementById('screen').innerHTML =
      '<div class="screen center"><span class="status-icon amber">' + I.alert + '</span>'
      + '<h1 class="h1">Almost there</h1><p class="sub">This site needs its Supabase connection before it can run. '
      + 'Add your project URL and anon key to <strong>config.js</strong>, then reload.</p></div>';
  }

  async function boot() {
    loadPlaces();
    if (!RestashAPI.configured) { configBanner(); return; }
    // Password-reset link: detect the recovery flow up front (the URL hash may be
    // consumed during auth init) and via the live auth event as a backup.
    const recovering = /(^|[#&?])recovery|type=recovery/.test(window.location.hash);
    if (recovering) state.recovery = true;
    RestashAPI.onPasswordRecovery(function () { state.recovery = true; if (state.booted) { state.view = 'resetPassword'; render(); } });
    try {
      const cat = await RestashAPI.getCatalog();
      PLATFORMS = cat.platforms; CONDITIONS = cat.conditions; PRICING = cat.pricing;
      COND_ICON = {}; CONDITIONS.forEach(c => { COND_ICON[c.id] = c.icon; });
      await loadSession();
      await loadClaims();
    } catch (err) {
      console.error(err);
      document.getElementById('screen').innerHTML =
        '<div class="screen center"><span class="status-icon amber">' + I.alert + '</span><h1 class="h1">Something went wrong</h1><p class="sub">' + esc(err.message || 'Could not reach the server.') + '</p></div>';
      return;
    }
    state.booted = true;
    state.view = state.recovery ? 'resetPassword' : (state.loggedIn ? 'platform' : 'welcome');
    render();
  }
  boot();
</script>
</body>
</html>
